<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <script>
    if(!localStorage.getItem("token")){
        window.location="index.html";
    }
    </script>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>📋 Task Manager</h2>

        <button onclick="logout()">
            Logout
        </button>
    </div>

    <div class="stats">

        <div class="card">
            <h3 id="totalTasks">0</h3>
            <p>Total Tasks</p>
        </div>

        <div class="card">
            <h3 id="pendingTasks">0</h3>
            <p>Pending</p>
        </div>

        <div class="card">
            <h3 id="completedTasks">0</h3>
            <p>Completed</p>
        </div>

    </div>

    <h3 id="taskCount"></h3>

    <input
        type="text"
        id="search"
        placeholder="🔍 Search Tasks"
        onkeyup="loadTasks()">

    <input
        type="text"
        id="title"
        placeholder="Task Title">

    <input
        type="text"
        id="description"
        placeholder="Description">

    <select id="priority">

        <option value="High">
           High
        </option>

        <option value="Medium" selected>
            Medium
        </option>

        <option value="Low">
            Low
        </option>

    </select>
    
    <input
        type="date"
        id="dueDate">

    <button onclick="addTask()">
        Add Task
    </button>

    <div id="tasks"></div>

</div>

<script src="script.js"></script>

</body>
</html>
